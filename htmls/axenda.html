<html>

    <title>GZmusica map</title>

    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="robots" content="index, follow" />
    <meta name="og:title" property="og:title" content="GZmusica map">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.0/css/all.css" integrity="sha384-73lvm+n3qtrHBHjfLuMY7kIL3CdwrRc5jqCtzWASs6MshmR6Tq2veVBC5OVkSwEF" crossorigin="anonymous">

    <style>
      @import url("https://fonts.googleapis.com/css?family=Raleway:400,300,700,500");

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }

      #menu {
        font-family: "Raleway", sans-serif !important;
      }

      /* Marker tweaks */
      .maplibregl-popup-close-button {
        display: none;
      }

        font-weight: 700;
        margin-bottom: -15px;
      }

      /* Bootstrap button */
      .btn.btn-dark:focus {
        background-color: #85001c
      }

      @media (max-width: 500px) {
        .HideOnMobile {
          display: none;
        }
        .ShowOnMobile {
          display: initial;
        }
      }

      @media (min-width: 500px) {
        .HideOnMobile {
          display: initial;
        }
        .ShowOnMobile {
          display: none;
        }
      }

    </style>

  </head>
  <body>

    <div id="map"></div>

    <div id="menu">
      <div class="col text-center">

        <!-- On big screens we show un-collapsed buttons -->
        <div class="HideOnMobile">
          <button class="btn btn-dark mt-1 mb-1 filter-today">Hoxe</button>
          <button class="btn btn-dark mt-1 mb-1 filter-tomorrow">Mañá</button>
          <button class="btn btn-dark mt-1 mb-1 filter-week">Próximos 7 días</button>
          <button class="btn btn-dark mt-1 mb-1 filter-month" autofocus="autofocus">Próximos 30 días</button>
        </div>

        <!-- On small screens we show buttons collapsed in a single dropdown -->
        <div class="ShowOnMobile">
          <div class="dropdown">
            <button class="btn btn-dark mt-1 mb-1 dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              Data

            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
              <a class="dropdown-item filter-today">Hoxe</a>
              <a class="dropdown-item filter-tomorrow">Mañá</a>
              <a class="dropdown-item filter-week">Próximos 7 días</a>
              <a class="dropdown-item filter-month">Próximos 30 días</a>
            </div>
          </div>
        </div>

      </div>

    <script>

      // Responsiveness for smartphones
      if (screen.width < 500) {
        initial_zoom = 6;  // the smaller the smartphone, the smaller the initial zoom

              // 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',

        "layers": [{
          "id": "osm",
          "type": "raster",
          "source": "osm" // This must match the source key above
        }]
      };

        style: style,
        center: [-8.0, 42.756501],

      map.dragRotate.disable();

      // better setWheelZoomRate(1) and disable touch zoom
      map.addControl(new maplibregl.NavigationControl());
      map.scrollZoom.setWheelZoomRate(1);
      map.touchZoomRotate.disable();

      // Add fullscreen button
      map.addControl(new maplibregl.FullscreenControl());

ation': 'Noia', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29585/-/catuxa-salom.html', 'dates': 'Domingo 22 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.884881205604417', '42.64713074744055']}, 'properties': {'name': 'Os Liantes', 'location': 'Boiro', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29713/-/os-liantes.html', 'dates': 'Domingo 22 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.544944780958442', '42.88144162858144']}, 'properties': {'name': 'Sumrrá', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29675/-/sumrra.html', 'dates': 'Domingo 22, Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.543907216119667', '42.881157187037026']}, 'properties': {'name': 'Banda das Crechas', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29710/-/banda-das-crechas.html', 'dates': 'Mércores 25 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.88721068939299', '42.30345359262175']}, 'properties': {'name': 'O Sonoro Maxín', 'location': 'Barbadás', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29712/-/o-sonoro-maxin.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.641978164443751', '42.43260750304193']}, 'properties': {'name': 'Couso Bares', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29483/-/couso-bares.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.778270448707323', '42.26505298148009']}, 'properties': {'name': 'Bestas', 'location': 'Cangas', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29577/-/bestas.html', 'dates': 'Sábado 28 [Marzo], Venres 10 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-6.113775217509089', '43.144933966701 k': 'https://www.gzmusica.com/axenda/eventdetail/29669/-/zavala-pedro-pastor-y-los-locos-descalzos.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.886737660707183', '42.7855709228275']}, 'properties': {'name': 'Faia Díaz', 'location': 'Noia', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29586/-/faia-diaz.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.638737939977336', '42.64639105998752']}, 'properties': {'name': 'Cantos de Taberna O Saviaño', 'location': 'O Saviñao', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29693/-/cantos-de-taberna-o-saviano.html', 'dates': 'Venres 03 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.555932467697973', '43.01332459653958']}, 'properties': {'name': 'A Candeloria O Último Berro', 'location': 'Lugo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29180/-/a-candeloria-o-ultimo-berro.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.394001631515778', '43.371032286496444']}, 'properties': {'name': 'Os Bar Ban Sónicos', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29351/-/os-bar-ban-sonicos.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.651497289603302', '42.19772736652544']}, 'properties': {'name': 'Clock & Roll Fest', 'location': 'O Rebullón, Tameiga (Mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29641/-/clock-roll-fest.html', 'dates': 'Sábado 11 [Abril]'}}]},

              "circle-radius": ["step", ["get", "point_count"], 20, 100, 30, 750, 40]
            }
          }), map.addLayer({

            layout: {
              "text-field": "{point_count_abbreviated}",
              // "text-font": ["DIN Offc Pro Medium", "Arial Unicode MS Bold"],
              "text-font": ["Open Sans Bold"],
              "text-size": 12
            }
          }), map.addLayer({
            id: "unclustered-point",
            type: "circle",
            source: "earthquakes",
            filter: ["!", ["has", "point_count"]],
            paint: {
              "circle-color": "#11b4da",
              "circle-radius": 7,
              "circle-stroke-width": 2,
              "circle-stroke-color": "#0b5975"
            }
          }), map.on("click", "clusters", e => {

                layers: ["clusters"]
              }),
              a = t[0].properties.cluster_id;
            map.getSource("earthquakes").getClusterExpansionZoom(a, (e, a) => {
              e || map.easeTo({
                center: t[0].geometry.coordinates,
                zoom: a
              })
            })

              link = e.features[0].properties.link,
