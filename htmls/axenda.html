<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GZmusica map</title>

    <meta name="description" content="A map of scheduled events from GZmusica (Galician folk music gigs).">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="robots" content="index, follow" />
    <meta name="og:title" property="og:title" content="GZmusica map">

    <!-- Emoji as Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <!-- Bootstrap scripts -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

    <!-- FontAwesome-->
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.0/css/all.css" integrity="sha384-73lvm+n3qtrHBHjfLuMY7kIL3CdwrRc5jqCtzWASs6MshmR6Tq2veVBC5OVkSwEF" crossorigin="anonymous">

    <!-- Mapbox-->
    <script src='https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
      @import url("https://fonts.googleapis.com/css?family=Raleway:400,300,700,500");

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }

      #menu {
        font-family: "Raleway", sans-serif !important;
      }

      /* Marker tweaks */
      .maplibregl-popup-close-button {
        display: none;
      }

      .maplibregl-popup-content h4 {
        font: 600 15px/22px 'Source Sans Pro', 'Helvetica Neue', sans-serif;
        font-weight: 700;
        margin-bottom: -15px;
      }

      /* Bootstrap button */
      .btn.btn-dark:focus {
        background-color: #85001c
      }

      @media (max-width: 500px) {
        .HideOnMobile {
          display: none;
        }
        .ShowOnMobile {
          display: initial;
        }
      }

      @media (min-width: 500px) {
        .HideOnMobile {
          display: initial;
        }
        .ShowOnMobile {
          display: none;
        }
      }

    </style>

  </head>
  <body>

    <div id="map"></div>

    <div id="menu">
      <div class="col text-center">

        <!-- On big screens we show un-collapsed buttons -->
        <div class="HideOnMobile">
          <button class="btn btn-dark mt-1 mb-1 filter-today">Hoxe</button>
          <button class="btn btn-dark mt-1 mb-1 filter-tomorrow">Mañá</button>
          <button class="btn btn-dark mt-1 mb-1 filter-week">Próximos 7 días</button>
          <button class="btn btn-dark mt-1 mb-1 filter-month" autofocus="autofocus">Próximos 30 días</button>
        </div>

        <!-- On small screens we show buttons collapsed in a single dropdown -->
        <div class="ShowOnMobile">
          <div class="dropdown">
            <button class="btn btn-dark mt-1 mb-1 dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              Data
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
              <a class="dropdown-item filter-today">Hoxe</a>
              <a class="dropdown-item filter-tomorrow">Mañá</a>
              <a class="dropdown-item filter-week">Próximos 7 días</a>
              <a class="dropdown-item filter-month">Próximos 30 días</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>

      // Responsiveness for smartphones
      if (screen.width < 500) {
        initial_zoom = 6;  // the smaller the smartphone, the smaller the initial zoom
        button_group = 1;  // small screens use the dropdown to filter dates
      } else if (screen.width < 1000) {
        initial_zoom = 7;
        button_group = 0;  // big screens use the un-collapsed buttons to filter dates
      } else {
        initial_zoom = 8;
        button_group = 0;
      }

      // Define the map style (OpenStreetMap raster tiles)
      const style = {
        "version": 8,
        "glyphs": "https://fonts.openmaptiles.org/{fontstack}/{range}.pbf", // issue --> https://github.com/mapbox/mapbox-gl-js/issues/4808
        "sources": {
          "osm": {
            "type": "raster",
            "tiles": [
              // 'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'
              // 'https://stamen-tiles.a.ssl.fastly.net/watercolor/{z}/{x}/{y}.jpg'
              'https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png'
              // 'http://a.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
              // 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
              // 'https://stamen-tiles-b.a.ssl.fastly.net/toner/{z}/{x}/{y}.png'
            ],
            "tileSize": 256,
            "attribution": "&copy; <a href='https://carto.com'>Carto</a> and <a href='https://www.openstreetmap.org'>OpenStreetMap</a> Contributors <br> &#127757; Map created by <a href='https://ignacioheredia.github.io'>Ignacio Heredia</a> <br> &#128204; <span class='badge badge-secondary'>Locations are approximate</span>",
            "maxzoom": 19
          }
        },
        "layers": [{
          "id": "osm",
          "type": "raster",
          "source": "osm" // This must match the source key above
        }]
      };

      const map = new maplibregl.Map({
        container: "map",
        // style: "mapbox://styles/mapbox/dark-v10",
        // style: 'https://demotiles.maplibre.org/style.json',
        // style: 'https://api.maptiler.com/maps/streets/style.json?key=get_your_own_OpIi9ZULNHzrESv6T2vL',
        // style: 'https://openmaptiles.github.io/positron-gl-style/style-cdn.json',
        style: style,
        center: [-8.0, 42.756501],
        zoom: initial_zoom
      });

      // Disable map rotation
      map.dragRotate.disable();
      map.touchZoomRotate.disableRotation();

      // Avoid fractional zoom that makes maps blurry
      // related issue: https://github.com/mapbox/mapbox-gl-js/issues/1695#issuecomment-478392580
      // --> suggested answer works but zooms on center of map, not on mouse pointer; therefore poor UX
      // better setWheelZoomRate(1) and disable touch zoom
      map.addControl(new maplibregl.NavigationControl());
      map.scrollZoom.setWheelZoomRate(1);
      map.touchZoomRotate.disable();

      // Add fullscreen button
      map.addControl(new maplibregl.FullscreenControl());

      map.on("load", () => {
        map.addSource("earthquakes", {
            type: "geojson",
            data: {'type': 'FeatureCollection', 'features': [{'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.55551483990407', '43.012478738538114']}, 'properties': {'name': 'Sons de Marzo', 'location': 'Lugo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29719/-/sons-de-marzo.html', 'dates': 'Mércores 25 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.544784278895296', '42.88198149753343']}, 'properties': {'name': 'Banda das Crechas', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29710/-/banda-das-crechas.html', 'dates': 'Mércores 25 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.232865928590057', '43.48553416059405']}, 'properties': {'name': 'Antía Muíño', 'location': 'Ferrol', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29610/-/antia-muino.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.722720724117957', '42.239528916392814']}, 'properties': {'name': 'Festa da Reconquista', 'location': 'Vigo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29747/-/festa-da-reconquista.html', 'dates': 'Venres 27, Sábado 28, Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.139462266365198', '43.47436896151537']}, 'properties': {'name': 'Cantigas da Terra + Airiños de Fene', 'location': 'Sillobre (Fene)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29738/-/cantigas-da-terra-airinos-de-fene.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.886044334325677', '42.30158054756119']}, 'properties': {'name': 'O Sonoro Maxín', 'location': 'Barbadás', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29712/-/o-sonoro-maxin.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.6418337079772', '42.433060991489526']}, 'properties': {'name': 'Couso Bares', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29483/-/couso-bares.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.642033650872277', '42.43354649771034']}, 'properties': {'name': 'Cousobares + Maravallada', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29736/-/cousobares-maravallada.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.546796640872953', '42.75130813365481']}, 'properties': {'name': 'Foliada das  Mulleres', 'location': 'Couso (A Estrada)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29742/-/foliada-das-mulleres.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.778803124220435', '42.26499017022138']}, 'properties': {'name': 'Bestas', 'location': 'Cangas', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29577/-/bestas.html', 'dates': 'Sábado 28 [Marzo], Venres 10 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-6.114570538805751', '43.14505771128849']}, 'properties': {'name': 'Mediarea', 'location': 'Teverga (Asturies)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29604/-/mediarea.html', 'dates': 'Sábado 28, Domingo 29 [Marzo], Venres 17 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-2.9346741807146364', '43.26326548468735']}, 'properties': {'name': 'Rebelkiom do Inframundo', 'location': 'Bilbo, Bizkaia (Euskal Herria)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29159/-/rebelkiom-do-inframundo.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.544950683244856', '42.88055452191804']}, 'properties': {'name': 'The Rapants', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29397/-/the-rapants.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.043269130385131', '43.53788716282821']}, 'properties': {'name': 'Vendaval Fest O Galiñeiro', 'location': 'Ribadeo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29560/-/vendaval-fest-o-galineiro.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.4410217875948765', '43.69450219844444']}, 'properties': {'name': 'X Foliada Nordestía', 'location': 'San Cibrao, Lieiro (Cervo)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29530/-/x-foliada-nordestia.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.526493301398052', '42.311602019087914']}, 'properties': {'name': 'Serán d´A Ermida', 'location': 'A Ermida (Pazos de Borbén)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29637/-/seran-d-a-ermida.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.723675257755364', '42.237767169811924']}, 'properties': {'name': '1ª Foliada Ao Son da Pandeireta', 'location': 'Vigo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29737/-/1-foliada-ao-son-da-pandeireta.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.73487834612169', '42.28184964559164']}, 'properties': {'name': 'Loita Amada', 'location': 'Moaña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29733/-/loita-amada.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.395430335509468', '43.37192968576633']}, 'properties': {'name': 'Sun Iou + Zavala', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29718/-/sun-iou-zavala.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.801931912021924', '42.190278500847775']}, 'properties': {'name': 'Vaia Desfeita', 'location': 'Allariz', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29717/-/vaia-desfeita.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.651620787721217', '42.19712758004762']}, 'properties': {'name': 'Zavala + Pedro Pastor y Los Locos Descalzos', 'location': 'O Rebullón, Tameiga (Mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29669/-/zavala-pedro-pastor-y-los-locos-descalzos.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.885831984658997', '42.78546975399999']}, 'properties': {'name': 'Faia Díaz', 'location': 'Noia', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29586/-/faia-diaz.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.5445607558313', '42.880700548118476']}, 'properties': {'name': 'Sumrrá', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29676/-/sumrra.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.394744599752176', '43.372749295242286']}, 'properties': {'name': 'Lumedoloop + Saibran', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29690/-/lumedoloop-saibran.html', 'dates': 'Mércores 01 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.637690740979657', '42.645718722459506']}, 'properties': {'name': 'Cantos de Taberna O Saviaño', 'location': 'O Saviñao', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29693/-/cantos-de-taberna-o-saviano.html', 'dates': 'Venres 03 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.674725018683048', '42.02126197895123']}, 'properties': {'name': 'XL Lanzo da Cruz', 'location': 'Sobrada (Tomiño)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29730/-/xl-lanzo-da-cruz.html', 'dates': 'Sábado 04, Domingo 05, Luns 06 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.454447910416093', '42.20795159733843']}, 'properties': {'name': 'XXI Serán de Vilasobroso', 'location': 'Vilasobroso (Mondariz)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29734/-/xxi-seran-de-vilasobroso.html', 'dates': 'Sábado 04 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.556502521844979', '43.01352425506462']}, 'properties': {'name': 'A Candeloria O Último Berro', 'location': 'Lugo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29180/-/a-candeloria-o-ultimo-berro.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.395840249069595', '43.37174141542051']}, 'properties': {'name': 'Os Bar Ban Sónicos', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29351/-/os-bar-ban-sonicos.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.641815845204281', '42.43301190345238']}, 'properties': {'name': 'Aña Urbana', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29755/-/ana-urbana.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.652901665686889', '42.19708782465108']}, 'properties': {'name': 'Clock & Roll Fest', 'location': 'O Rebullón, Tameiga (Mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29641/-/clock-roll-fest.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.62363643592259', '42.20405571760294']}, 'properties': {'name': 'VI Encontro de Cantos Populares e de Taberna', 'location': 'Torroso (mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29729/-/vi-encontro-de-cantos-populares-e-de-taberna.html', 'dates': 'Domingo 12 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.39398382290878', '43.37151997411493']}, 'properties': {'name': 'Mediarea + Tiruleque', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29681/-/mediarea-tiruleque.html', 'dates': 'Venres 17 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-3.702994230731484', '40.41844071952409']}, 'properties': {'name': 'Rebeliom do Inframundo', 'location': 'Madrid (España)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29160/-/rebeliom-do-inframundo.html', 'dates': 'Sábado 18 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.723877264675231', '42.238881409261154']}, 'properties': {'name': 'Vimbio', 'location': 'Vigo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29503/-/vimbio.html', 'dates': 'Sábado 18 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.414505617005684', '42.209576907165136']}, 'properties': {'name': 'Serán Tradicional de Meirol', 'location': 'Meirol (Mondariz)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29735/-/seran-tradicional-de-meirol.html', 'dates': 'Sábado 18 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-3.7032074816604177', '40.41776795926483']}, 'properties': {'name': 'Os Sibailas', 'location': 'Madrid (España)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29589/-/os-sibailas.html', 'dates': 'Domingo 19 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.545286858486978', '42.880927301913246']}, 'properties': {'name': 'Xan Campos', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29592/-/xan-campos.html', 'dates': 'Mércores 22 [Abril]'}}]},
            // data: "https://docs.mapbox.com/mapbox-gl-js/assets/earthquakes.geojson",
            cluster: !0,
            clusterMaxZoom: 14,
            clusterRadius: 50
          }), map.addLayer({
            id: "clusters",
            type: "circle",
            source: "earthquakes",
            filter: ["has", "point_count"],
            paint: {
              "circle-color": ["step", ["get", "point_count"], "#51bbd6", 10, "#ed9f32", 20, "#f28cb1"],
              "circle-radius": ["step", ["get", "point_count"], 20, 100, 30, 750, 40]
            }
          }), map.addLayer({
            id: "cluster-count",
            type: "symbol",
            source: "earthquakes",
            filter: ["has", "point_count"],
            layout: {
              "text-field": "{point_count_abbreviated}",
              // "text-font": ["DIN Offc Pro Medium", "Arial Unicode MS Bold"],
              "text-font": ["Open Sans Bold"],
              "text-size": 12
            }
          }), map.addLayer({
            id: "unclustered-point",
            type: "circle",
            source: "earthquakes",
            filter: ["!", ["has", "point_count"]],
            paint: {
              "circle-color": "#11b4da",
              "circle-radius": 7,
              "circle-stroke-width": 2,
              "circle-stroke-color": "#0b5975"
            }
          }), map.on("click", "clusters", e => {
            const t = map.queryRenderedFeatures(e.point, {
                layers: ["clusters"]
              }),
              a = t[0].properties.cluster_id;
            map.getSource("earthquakes").getClusterExpansionZoom(a, (e, a) => {
              e || map.easeTo({
                center: t[0].geometry.coordinates,
                zoom: a
              })
            })
          }), map.on("click", "unclustered-point", e => {
            const t = e.features[0].geometry.coordinates.slice(),
              name = e.features[0].properties.name,
              location = e.features[0].properties.location,
              link = e.features[0].properties.link,
              dates = e.features[0].properties.dates;
            for (; Math.abs(e.lngLat.lng - t[0]) > 180;) t[0] += e.lngLat.lng > t[0] ? 360 : -360;
            (new maplibregl.Popup).setLngLat(t).setHTML(`
            <h4>${name}</h4><br>
            <i class="fa fa-map-marker" aria-hidden="true"></i> ${location}<br>
            <a href="${link}" target="_blank" rel="noopener"><i class="fa fa-external-link" aria-hidden="true"></i> Detalles</a><br>
            <i class="fa fa-calendar" aria-hidden="true"></i> ${dates}
            `).addTo(map)
          }), map.on("mouseenter", "clusters", () => {
            map.getCanvas().style.cursor = "pointer"
          }), map.on("mouseleave", "clusters", () => {
            map.getCanvas().style.cursor = ""
          }),

          // Filter data by date buttons
          document.getElementsByClassName('filter-today')[button_group].addEventListener('click', function() {
            map.getSource('earthquakes').setData({'type': 'FeatureCollection', 'features': []});
