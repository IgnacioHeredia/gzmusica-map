<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GZmusica map</title>

    <meta name="description" content="A map of scheduled events from GZmusica (Galician folk music gigs).">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="robots" content="index, follow" />
    <meta name="og:title" property="og:title" content="GZmusica map">

    <!-- Emoji as Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <!-- Bootstrap scripts -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

    <!-- FontAwesome-->
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.0/css/all.css" integrity="sha384-73lvm+n3qtrHBHjfLuMY7kIL3CdwrRc5jqCtzWASs6MshmR6Tq2veVBC5OVkSwEF" crossorigin="anonymous">

    <!-- Mapbox-->
    <script src='https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
      @import url("https://fonts.googleapis.com/css?family=Raleway:400,300,700,500");

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }

      #menu {
        font-family: "Raleway", sans-serif !important;
      }

      /* Marker tweaks */
      .maplibregl-popup-close-button {
        display: none;
      }

      .maplibregl-popup-content h4 {
        font: 600 15px/22px 'Source Sans Pro', 'Helvetica Neue', sans-serif;
        font-weight: 700;
        margin-bottom: -15px;
      }

      /* Bootstrap button */
      .btn.btn-dark:focus {
        background-color: #85001c
      }

      @media (max-width: 500px) {
        .HideOnMobile {
          display: none;
        }
        .ShowOnMobile {
          display: initial;
        }
      }

      @media (min-width: 500px) {
        .HideOnMobile {
          display: initial;
        }
        .ShowOnMobile {
          display: none;
        }
      }

    </style>

  </head>
  <body>

    <div id="map"></div>

    <div id="menu">
      <div class="col text-center">

        <!-- On big screens we show un-collapsed buttons -->
        <div class="HideOnMobile">
          <button class="btn btn-dark mt-1 mb-1 filter-today">Hoxe</button>
          <button class="btn btn-dark mt-1 mb-1 filter-tomorrow">Mañá</button>
          <button class="btn btn-dark mt-1 mb-1 filter-week">Próximos 7 días</button>
          <button class="btn btn-dark mt-1 mb-1 filter-month" autofocus="autofocus">Próximos 30 días</button>
        </div>

        <!-- On small screens we show buttons collapsed in a single dropdown -->
        <div class="ShowOnMobile">
          <div class="dropdown">
            <button class="btn btn-dark mt-1 mb-1 dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              Data
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
              <a class="dropdown-item filter-today">Hoxe</a>
              <a class="dropdown-item filter-tomorrow">Mañá</a>
              <a class="dropdown-item filter-week">Próximos 7 días</a>
              <a class="dropdown-item filter-month">Próximos 30 días</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>

      // Responsiveness for smartphones
      if (screen.width < 500) {
        initial_zoom = 6;  // the smaller the smartphone, the smaller the initial zoom
        button_group = 1;  // small screens use the dropdown to filter dates
      } else if (screen.width < 1000) {
        initial_zoom = 7;
        button_group = 0;  // big screens use the un-collapsed buttons to filter dates
      } else {
        initial_zoom = 8;
        button_group = 0;
      }

      // Define the map style (OpenStreetMap raster tiles)
      const style = {
        "version": 8,
        "glyphs": "https://fonts.openmaptiles.org/{fontstack}/{range}.pbf", // issue --> https://github.com/mapbox/mapbox-gl-js/issues/4808
        "sources": {
          "osm": {
            "type": "raster",
            "tiles": [
              // 'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'
              // 'https://stamen-tiles.a.ssl.fastly.net/watercolor/{z}/{x}/{y}.jpg'
              'https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png'
              // 'http://a.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
              // 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
              // 'https://stamen-tiles-b.a.ssl.fastly.net/toner/{z}/{x}/{y}.png'
            ],
            "tileSize": 256,
            "attribution": "&copy; <a href='https://carto.com'>Carto</a> and <a href='https://www.openstreetmap.org'>OpenStreetMap</a> Contributors <br> &#127757; Map created by <a href='https://ignacioheredia.github.io'>Ignacio Heredia</a> <br> &#128204; <span class='badge badge-secondary'>Locations are approximate</span>",
            "maxzoom": 19
          }
        },
        "layers": [{
          "id": "osm",
          "type": "raster",
          "source": "osm" // This must match the source key above
        }]
      };

      const map = new maplibregl.Map({
        container: "map",
        // style: "mapbox://styles/mapbox/dark-v10",
        // style: 'https://demotiles.maplibre.org/style.json',
        // style: 'https://api.maptiler.com/maps/streets/style.json?key=get_your_own_OpIi9ZULNHzrESv6T2vL',
        // style: 'https://openmaptiles.github.io/positron-gl-style/style-cdn.json',
        style: style,
        center: [-8.0, 42.756501],
        zoom: initial_zoom
      });

      // Disable map rotation
      map.dragRotate.disable();
      map.touchZoomRotate.disableRotation();

      // Avoid fractional zoom that makes maps blurry
      // related issue: https://github.com/mapbox/mapbox-gl-js/issues/1695#issuecomment-478392580
      // --> suggested answer works but zooms on center of map, not on mouse pointer; therefore poor UX
      // better setWheelZoomRate(1) and disable touch zoom
      map.addControl(new maplibregl.NavigationControl());
      map.scrollZoom.setWheelZoomRate(1);
      map.touchZoomRotate.disable();

      // Add fullscreen button
      map.addControl(new maplibregl.FullscreenControl());

      map.on("load", () => {
        map.addSource("earthquakes", {
            type: "geojson",
            data: {'type': 'FeatureCollection', 'features': [{'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.723741239771309', '42.23897476155314']}, 'properties': {'name': 'Festa da Reconquista', 'location': 'Vigo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29747/-/festa-da-reconquista.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.586032390693361', '42.46329056843925']}, 'properties': {'name': 'XLVI Feira do Viño de Amandi', 'location': 'Sober', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29767/-/xlvi-feira-do-vino-de-amandi.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-5.329340449670141', '43.33467043425865']}, 'properties': {'name': 'Mediarea', 'location': 'Piloña (Asturies)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29605/-/mediarea.html', 'dates': 'Domingo 29 [Marzo], Venres 17 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.653081208571502', '42.19695674899593']}, 'properties': {'name': 'Zavala + Pedro Pastor y Los Locos Descalzos', 'location': 'O Rebullón, Tameiga (Mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29669/-/zavala-pedro-pastor-y-los-locos-descalzos.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.887098081716616', '42.78608750209201']}, 'properties': {'name': 'Faia Díaz', 'location': 'Noia', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29586/-/faia-diaz.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.54507403949263', '42.88107191490907']}, 'properties': {'name': 'Sumrrá', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29676/-/sumrra.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.394215871164482', '43.37254740626002']}, 'properties': {'name': 'Lumedoloop + Saibran', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29690/-/lumedoloop-saibran.html', 'dates': 'Mércores 01 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.637964950740552', '42.64607445099132']}, 'properties': {'name': 'Cantos de Taberna O Saviaño', 'location': 'O Saviñao', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29693/-/cantos-de-taberna-o-saviano.html', 'dates': 'Venres 03 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.054288627945514', '42.57733967627823']}, 'properties': {'name': 'Lus de Torreiro', 'location': 'Ferramulín, Hórreos (Folgoso do Courel)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29770/-/lus-de-torreiro.html', 'dates': 'Venres 03, Sábado 04 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.554750233790913', '43.01222223879694']}, 'properties': {'name': 'Ruada no Clavi', 'location': 'Lugo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29764/-/ruada-no-clavi.html', 'dates': 'Venres 03 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.67519603403758', '42.021875572759306']}, 'properties': {'name': 'XL Lanzo da Cruz', 'location': 'Sobrada (Tomiño)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29730/-/xl-lanzo-da-cruz.html', 'dates': 'Sábado 04, Domingo 05, Luns 06 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.45378434538851', '42.20803083002245']}, 'properties': {'name': 'XXI Serán de Vilasobroso', 'location': 'Vilasobroso (Mondariz)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29734/-/xxi-seran-de-vilasobroso.html', 'dates': 'Sábado 04 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.765996960818137', '42.59652269074605']}, 'properties': {'name': 'Bestas', 'location': 'Vilagarcía de Arousa', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29578/-/bestas.html', 'dates': 'Venres 10 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.55773060043727', '42.10323337480503']}, 'properties': {'name': 'Foliada Seisporoito', 'location': 'Salceda de Caselas', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29763/-/foliada-seisporoito.html', 'dates': 'Venres 10 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.554707519785522', '43.01218623396548']}, 'properties': {'name': 'A Candeloria O Último Berro', 'location': 'Lugo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29180/-/a-candeloria-o-ultimo-berro.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.394372510323041', '43.37128317301891']}, 'properties': {'name': 'Os Bar Ban Sónicos', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29351/-/os-bar-ban-sonicos.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.64196004422388', '42.43375108081422']}, 'properties': {'name': 'Aña Urbana', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29755/-/ana-urbana.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.65148322374211', '42.19847830398386']}, 'properties': {'name': 'Clock & Roll Fest', 'location': 'O Rebullón, Tameiga (Mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29641/-/clock-roll-fest.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.62262176684914', '42.203970244273386']}, 'properties': {'name': 'VI Encontro de Cantos Populares e de Taberna', 'location': 'Torroso (mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29729/-/vi-encontro-de-cantos-populares-e-de-taberna.html', 'dates': 'Domingo 12 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.394209488565997', '43.37213943276093']}, 'properties': {'name': 'Mediarea + Tiruleque', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29681/-/mediarea-tiruleque.html', 'dates': 'Venres 17 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-3.702300983794672', '40.417081446889874']}, 'properties': {'name': 'Rebeliom do Inframundo', 'location': 'Madrid (España)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29160/-/rebeliom-do-inframundo.html', 'dates': 'Sábado 18 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.8537903408172705', '43.686141272651945']}, 'properties': {'name': 'Serán Son do Noso', 'location': 'Ortigueira', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29762/-/seran-son-do-noso.html', 'dates': 'Sábado 18 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.723578200443741', '42.238068402046075']}, 'properties': {'name': 'Vimbio', 'location': 'Vigo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29503/-/vimbio.html', 'dates': 'Sábado 18 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.415728750281536', '42.20984092472142']}, 'properties': {'name': 'Serán Tradicional de Meirol', 'location': 'Meirol (Mondariz)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29735/-/seran-tradicional-de-meirol.html', 'dates': 'Sábado 18 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.885132902355798', '42.64741169166518']}, 'properties': {'name': 'Maneiro', 'location': 'Boiro', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29765/-/maneiro.html', 'dates': 'Sábado 18 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-3.702318032894266', '40.418229537259045']}, 'properties': {'name': 'Os Sibailas', 'location': 'Madrid (España)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29589/-/os-sibailas.html', 'dates': 'Domingo 19 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.544113658448332', '42.880782486199514']}, 'properties': {'name': 'Xan Campos', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29592/-/xan-campos.html', 'dates': 'Mércores 22 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.642039757121703', '42.43336165321351']}, 'properties': {'name': 'Galegote Rock', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29760/-/galegote-rock.html', 'dates': 'Venres 24, Sábado 25 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.310790812015144', '42.112900201618906']}, 'properties': {'name': 'LXVI Festa da Lamprea', 'location': 'Arbo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29759/-/lxvi-festa-da-lamprea.html', 'dates': 'Venres 24, Sábado 25, Domingo 26 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.641789313675234', '42.43278788277384']}, 'properties': {'name': 'Xolda', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29484/-/xolda.html', 'dates': 'Venres 24 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.884616528823274', '42.64669611502402']}, 'properties': {'name': 'Zënzar + Sun Iou', 'location': 'Boiro', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29768/-/zenzar-sun-iou.html', 'dates': 'Venres 24 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.223039812415973', '42.62499798829919']}, 'properties': {'name': 'IV Xornada Carballesa', 'location': 'Seceda (Folgoso do Courel)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29714/-/iv-xornada-carballesa.html', 'dates': 'Sábado 25 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-2.4782809956961263', '43.18407846630271']}, 'properties': {'name': 'Xabier Díaz & Adufeiras de Salitre', 'location': 'Eibar, Gipuzkoa (Euskal Herria)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29769/-/xabier-diaz-adufeiras-de-salitre.html', 'dates': 'Sábado 25 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.509356514785138', '42.539236457969004']}, 'properties': {'name': 'I Cantos de Taberna Campo Lameiro', 'location': 'Campo Lameiro', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29689/-/i-cantos-de-taberna-campo-lameiro.html', 'dates': 'Sábado 25 [Abril]'}}]},
            // data: "https://docs.mapbox.com/mapbox-gl-js/assets/earthquakes.geojson",
            cluster: !0,
            clusterMaxZoom: 14,
            clusterRadius: 50
          }), map.addLayer({
            id: "clusters",
            type: "circle",
            source: "earthquakes",
            filter: ["has", "point_count"],
            paint: {
              "circle-color": ["step", ["get", "point_count"], "#51bbd6", 10, "#ed9f32", 20, "#f28cb1"],
              "circle-radius": ["step", ["get", "point_count"], 20, 100, 30, 750, 40]
            }
          }), map.addLayer({
            id: "cluster-count",
            type: "symbol",
            source: "earthquakes",
            filter: ["has", "point_count"],
            layout: {
              "text-field": "{point_count_abbreviated}",
              // "text-font": ["DIN Offc Pro Medium", "Arial Unicode MS Bold"],
              "text-font": ["Open Sans Bold"],
              "text-size": 12
            }
          }), map.addLayer({
            id: "unclustered-point",
            type: "circle",
            source: "earthquakes",
            filter: ["!", ["has", "point_count"]],
            paint: {
              "circle-color": "#11b4da",
              "circle-radius": 7,
              "circle-stroke-width": 2,
              "circle-stroke-color": "#0b5975"
            }
          }), map.on("click", "clusters", e => {
            const t = map.queryRenderedFeatures(e.point, {
                layers: ["clusters"]
              }),
              a = t[0].properties.cluster_id;
            map.getSource("earthquakes").getClusterExpansionZoom(a, (e, a) => {
              e || map.easeTo({
                center: t[0].geometry.coordinates,
                zoom: a
              })
            })
          }), map.on("click", "unclustered-point", e => {
            const t = e.features[0].geometry.coordinates.slice(),
              name = e.features[0].properties.name,
              location = e.features[0].properties.location,
              link = e.features[0].properties.link,
              dates = e.features[0].properties.dates;
            for (; Math.abs(e.lngLat.lng - t[0]) > 180;) t[0] += e.lngLat.lng > t[0] ? 360 : -360;
            (new maplibregl.Popup).setLngLat(t).setHTML(`
            <h4>${name}</h4><br>
            <i class="fa fa-map-marker" aria-hidden="true"></i> ${location}<br>
            <a href="${link}" target="_blank" rel="noopener"><i class="fa fa-external-link" aria-hidden="true"></i> Detalles</a><br>
            <i class="fa fa-calendar" aria-hidden="true"></i> ${dates}
            `).addTo(map)
          }), map.on("mouseenter", "clusters", () => {
            map.getCanvas().style.cursor = "pointer"
          }), map.on("mouseleave", "clusters", () => {
            map.getCanvas().style.cursor = ""
          }),
