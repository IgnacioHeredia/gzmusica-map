<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GZmusica map</title>

    <meta name="description" content="A map of scheduled events from GZmusica (Galician folk music gigs).">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="robots" content="index, follow" />
    <meta name="og:title" property="og:title" content="GZmusica map">

    <!-- Emoji as Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <!-- Bootstrap scripts -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

    <!-- FontAwesome-->
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.0/css/all.css" integrity="sha384-73lvm+n3qtrHBHjfLuMY7kIL3CdwrRc5jqCtzWASs6MshmR6Tq2veVBC5OVkSwEF" crossorigin="anonymous">

    <!-- Mapbox-->
    <script src='https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.css' rel='stylesheet' />

    <style>
      @import url("https://fonts.googleapis.com/css?family=Raleway:400,300,700,500");

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }

      #menu {
        font-family: "Raleway", sans-serif !important;
      }

      /* Marker tweaks */
      .maplibregl-popup-close-button {
        display: none;
      }

      .maplibregl-popup-content h4 {
        font: 600 15px/22px 'Source Sans Pro', 'Helvetica Neue', sans-serif;
        font-weight: 700;
        margin-bottom: -15px;
      }

      /* Bootstrap button */
      .btn.btn-dark:focus {
        background-color: #85001c
      }

      @media (max-width: 500px) {
        .HideOnMobile {
          display: none;
        }
        .ShowOnMobile {
          display: initial;
        }
      }

      @media (min-width: 500px) {
        .HideOnMobile {
          display: initial;
        }
        .ShowOnMobile {
          display: none;
        }
      }

    </style>

  </head>
  <body>

    <div id="map"></div>

    <div id="menu">
      <div class="col text-center">

        <!-- On big screens we show un-collapsed buttons -->
        <div class="HideOnMobile">
          <button class="btn btn-dark mt-1 mb-1 filter-today">Hoxe</button>
          <button class="btn btn-dark mt-1 mb-1 filter-tomorrow">Mañá</button>
          <button class="btn btn-dark mt-1 mb-1 filter-week">Próximos 7 días</button>
          <button class="btn btn-dark mt-1 mb-1 filter-month" autofocus="autofocus">Próximos 30 días</button>
        </div>

        <!-- On small screens we show buttons collapsed in a single dropdown -->
        <div class="ShowOnMobile">
          <div class="dropdown">
            <button class="btn btn-dark mt-1 mb-1 dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              Data
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
              <a class="dropdown-item filter-today">Hoxe</a>
              <a class="dropdown-item filter-tomorrow">Mañá</a>
              <a class="dropdown-item filter-week">Próximos 7 días</a>
              <a class="dropdown-item filter-month">Próximos 30 días</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>

      // Responsiveness for smartphones
      if (screen.width < 500) {
        initial_zoom = 6;  // the smaller the smartphone, the smaller the initial zoom
        button_group = 1;  // small screens use the dropdown to filter dates
      } else if (screen.width < 1000) {
        initial_zoom = 7;
        button_group = 0;  // big screens use the un-collapsed buttons to filter dates
      } else {
        initial_zoom = 8;
        button_group = 0;
      }

      // Define the map style (OpenStreetMap raster tiles)
      const style = {
        "version": 8,
        "glyphs": "https://fonts.openmaptiles.org/{fontstack}/{range}.pbf", // issue --> https://github.com/mapbox/mapbox-gl-js/issues/4808
        "sources": {
          "osm": {
            "type": "raster",
            "tiles": [
              // 'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'
              // 'https://stamen-tiles.a.ssl.fastly.net/watercolor/{z}/{x}/{y}.jpg'
              'https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png'
              // 'http://a.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
              // 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
              // 'https://stamen-tiles-b.a.ssl.fastly.net/toner/{z}/{x}/{y}.png'
            ],
            "tileSize": 256,
            "attribution": "&copy; <a href='https://carto.com'>Carto</a> and <a href='https://www.openstreetmap.org'>OpenStreetMap</a> Contributors <br> &#127757; Map created by <a href='https://ignacioheredia.github.io'>Ignacio Heredia</a> <br> &#128204; <span class='badge badge-secondary'>Locations are approximate</span>",
            "maxzoom": 19
          }
        },
        "layers": [{
          "id": "osm",
          "type": "raster",
          "source": "osm" // This must match the source key above
        }]
      };

      const map = new maplibregl.Map({
        container: "map",
        // style: "mapbox://styles/mapbox/dark-v10",
        // style: 'https://demotiles.maplibre.org/style.json',
        // style: 'https://api.maptiler.com/maps/streets/style.json?key=get_your_own_OpIi9ZULNHzrESv6T2vL',
        // style: 'https://openmaptiles.github.io/positron-gl-style/style-cdn.json',
        style: style,
        center: [-8.0, 42.756501],
        zoom: initial_zoom
      });

      // Disable map rotation
      map.dragRotate.disable();
      map.touchZoomRotate.disableRotation();

      // Avoid fractional zoom that makes maps blurry
      // related issue: https://github.com/mapbox/mapbox-gl-js/issues/1695#issuecomment-478392580
      // --> suggested answer works but zooms on center of map, not on mouse pointer; therefore poor UX
      // better setWheelZoomRate(1) and disable touch zoom
      map.addControl(new maplibregl.NavigationControl());
      map.scrollZoom.setWheelZoomRate(1);
      map.touchZoomRotate.disable();

      // Add fullscreen button
      map.addControl(new maplibregl.FullscreenControl());

      map.on("load", () => {
        map.addSource("earthquakes", {
            type: "geojson",
            data: {'type': 'FeatureCollection', 'features': [{'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.56429552924084', '42.13543842134457']}, 'properties': {'name': 'XVI Foliada Furancheira', 'location': 'A Picoña (Salceda de Caselas)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29643/-/xvi-foliada-furancheira.html', 'dates': 'Venres 20, Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-1.9815849024452017', '43.32451177538838']}, 'properties': {'name': 'Antía Muíño', 'location': 'Donosti, Gipuzkoa 8Euskal Herria)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29608/-/antia-muino.html', 'dates': 'Sábado 21, Domingo 22, Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.682526692224157', '43.70561679035153']}, 'properties': {'name': 'II Serán de Negradas', 'location': 'Negradas (O Vicedo)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29572/-/ii-seran-de-negradas.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-3.70315258026914', '40.41721745159477']}, 'properties': {'name': 'Os Sibailas', 'location': 'Madrid (España)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29588/-/os-sibailas.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.413829986886076', '42.77989055053485']}, 'properties': {'name': 'X Estremonía Cantada', 'location': 'Sarria', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29433/-/x-estremonia-cantada.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.38782265644483', '43.289991444611566']}, 'properties': {'name': 'Xornada Solidaria Tods con Carmiña', 'location': 'Culleredo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29715/-/xornada-solidaria-tods-con-carmina.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.550257609210066', '42.29581330943138']}, 'properties': {'name': 'Serán en Amoedo', 'location': 'Amoedo (Pazos de Borbén)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29636/-/seran-en-amoedo.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.545838897357681', '42.88191209272475']}, 'properties': {'name': 'Sés', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29591/-/ses.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.663149858678294', '42.264162178120436']}, 'properties': {'name': 'Serán Froles Mareliñas', 'location': 'Chapela (Redondela)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29687/-/seran-froles-marelinas.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.790182179661958', '42.950391765086614']}, 'properties': {'name': 'Innopiah + Mata-Ratos + Devassas', 'location': 'Angra do Heroísmo, Azores (Portugal)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29472/-/innopiah-mata-ratos-devassas.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.723615389326731', '42.238145375581404']}, 'properties': {'name': 'Vigocoruñenta II', 'location': 'Vigo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29671/-/vigocorunenta-ii.html', 'dates': 'Sábado 21 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.556215496456483', '43.01374635322209']}, 'properties': {'name': 'Lumedoloop + Saibran', 'location': 'Lugo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29691/-/lumedoloop-saibran.html', 'dates': 'Sábado 21 [Marzo], Mércores 01 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.887218481308599', '42.786236173833466']}, 'properties': {'name': 'Catuxa Salom', 'location': 'Noia', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29585/-/catuxa-salom.html', 'dates': 'Domingo 22 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.88458594133416', '42.646490459007']}, 'properties': {'name': 'Os Liantes', 'location': 'Boiro', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29713/-/os-liantes.html', 'dates': 'Domingo 22 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.54401914610651', '42.880987126606946']}, 'properties': {'name': 'Sumrrá', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29675/-/sumrra.html', 'dates': 'Domingo 22, Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.556297526126173', '43.012178384318986']}, 'properties': {'name': 'Sons de Marzo', 'location': 'Lugo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29719/-/sons-de-marzo.html', 'dates': 'Mércores 25 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.54465045676577', '42.88162123326838']}, 'properties': {'name': 'Banda das Crechas', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29710/-/banda-das-crechas.html', 'dates': 'Mércores 25 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.88643559988897', '42.30317007294131']}, 'properties': {'name': 'O Sonoro Maxín', 'location': 'Barbadás', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29712/-/o-sonoro-maxin.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.642429095592586', '42.43211319979032']}, 'properties': {'name': 'Couso Bares', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29483/-/couso-bares.html', 'dates': 'Venres 27 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.77940581569296', '42.26666935990971']}, 'properties': {'name': 'Bestas', 'location': 'Cangas', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29577/-/bestas.html', 'dates': 'Sábado 28 [Marzo], Venres 10 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-6.114218486274033', '43.14460226192869']}, 'properties': {'name': 'Mediarea', 'location': 'Teverga (Asturies)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29604/-/mediarea.html', 'dates': 'Sábado 28, Domingo 29 [Marzo], Venres 17 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-2.9331776242617114', '43.2633933583822']}, 'properties': {'name': 'Rebelkiom do Inframundo', 'location': 'Bilbo, Bizkaia (Euskal Herria)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29159/-/rebelkiom-do-inframundo.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.54429357931384', '42.881860655200214']}, 'properties': {'name': 'The Rapants', 'location': 'Santiago de Compostela', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29397/-/the-rapants.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.043313786723277', '43.53621196809567']}, 'properties': {'name': 'Vendaval Fest O Galiñeiro', 'location': 'Ribadeo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29560/-/vendaval-fest-o-galineiro.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.440568559581191', '43.69533147101576']}, 'properties': {'name': 'X Foliada Nordestía', 'location': 'San Cibrao, Lieiro (Cervo)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29530/-/x-foliada-nordestia.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.527270183089486', '42.31202225741465']}, 'properties': {'name': 'Serán d´A Ermida', 'location': 'A Ermida (Pazos de Borbén)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29637/-/seran-d-a-ermida.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.394991684561127', '43.37255532217002']}, 'properties': {'name': 'Sun Iou + Zavala', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29718/-/sun-iou-zavala.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.800590070547458', '42.19007603477924']}, 'properties': {'name': 'Vaia Desfeita', 'location': 'Allariz', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29717/-/vaia-desfeita.html', 'dates': 'Sábado 28 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.652971483103519', '42.19887466336846']}, 'properties': {'name': 'Zavala + Pedro Pastor y Los Locos Descalzos', 'location': 'O Rebullón, Tameiga (Mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29669/-/zavala-pedro-pastor-y-los-locos-descalzos.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.887537980674743', '42.785841063220424']}, 'properties': {'name': 'Faia Díaz', 'location': 'Noia', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29586/-/faia-diaz.html', 'dates': 'Domingo 29 [Marzo]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.639380519208935', '42.645572774301925']}, 'properties': {'name': 'Cantos de Taberna O Saviaño', 'location': 'O Saviñao', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29693/-/cantos-de-taberna-o-saviano.html', 'dates': 'Venres 03 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.554647616379885', '43.01288391182593']}, 'properties': {'name': 'A Candeloria O Último Berro', 'location': 'Lugo', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29180/-/a-candeloria-o-ultimo-berro.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.394086949004427', '43.37228997980566']}, 'properties': {'name': 'Os Bar Ban Sónicos', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29351/-/os-bar-ban-sonicos.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.652638288634924', '42.19728410916885']}, 'properties': {'name': 'Clock & Roll Fest', 'location': 'O Rebullón, Tameiga (Mos)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29641/-/clock-roll-fest.html', 'dates': 'Sábado 11 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.395388643405377', '43.37241575464049']}, 'properties': {'name': 'Mediarea + Tiruleque', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29681/-/mediarea-tiruleque.html', 'dates': 'Venres 17 [Abril]'}}]},
            // data: "https://docs.mapbox.com/mapbox-gl-js/assets/earthquakes.geojson",
            cluster: !0,
            clusterMaxZoom: 14,
            clusterRadius: 50
          }), map.addLayer({
            id: "clusters",
            type: "circle",
            source: "earthquakes",
            filter: ["has", "point_count"],
            paint: {
              "circle-color": ["step", ["get", "point_count"], "#51bbd6", 10, "#ed9f32", 20, "#f28cb1"],
              "circle-radius": ["step", ["get", "point_count"], 20, 100, 30, 750, 40]
            }
          }), map.addLayer({
            id: "cluster-count",
            type: "symbol",
            source: "earthquakes",
            filter: ["has", "point_count"],
            layout: {
              "text-field": "{point_count_abbreviated}",
              // "text-font": ["DIN Offc Pro Medium", "Arial Unicode MS Bold"],
              "text-font": ["Open Sans Bold"],
              "text-size": 12
            }
          }), map.addLayer({
            id: "unclustered-point",
            type: "circle",
            source: "earthquakes",
            filter: ["!", ["has", "point_count"]],
            paint: {
              "circle-color": "#11b4da",
              "circle-radius": 7,
              "circle-stroke-width": 2,
              "circle-stroke-color": "#0b5975"
            }
          }), map.on("click", "clusters", e => {
            const t = map.queryRenderedFeatures(e.point, {
                layers: ["clusters"]
              }),
              a = t[0].properties.cluster_id;
            map.getSource("earthquakes").getClusterExpansionZoom(a, (e, a) => {
              e || map.easeTo({
                center: t[0].geometry.coordinates,
                zoom: a
              })
            })
          }), map.on("click", "unclustered-point", e => {
            const t = e.features[0].geometry.coordinates.slice(),
              name = e.features[0].properties.name,
              location = e.features[0].properties.location,
              link = e.features[0].properties.link,
              dates = e.features[0].properties.dates;
            for (; Math.abs(e.lngLat.lng - t[0]) > 180;) t[0] += e.lngLat.lng > t[0] ? 360 : -360;
            (new maplibregl.Popup).setLngLat(t).setHTML(`
            <h4>${name}</h4><br>
            <i class="fa fa-map-marker" aria-hidden="true"></i> ${location}<br>
            <a href="${link}" target="_blank" rel="noopener"><i class="fa fa-external-link" aria-hidden="true"></i> Detalles</a><br>
            <i class="fa fa-calendar" aria-hidden="true"></i> ${dates}
            `).addTo(map)
          }), map.on("mouseenter", "clusters", () => {
            map.getCanvas().style.cursor = "pointer"
          }), map.on("mouseleave", "clusters", () => {
            map.getCanvas().style.cursor = ""
          }),

          // Filter data by date buttons
          document.getElementsByClassName('filter-today')[button_group].addEventListener('click', function() {
            map.getSource('earthquakes').setData({'type': 'FeatureCollection', 'features': []});
          }),
          document.getElementsByClassName('filter-tomorrow')[button_group].addEventListener('click', function() {
            map.getSource('earthquakes').setData({'type': 'FeatureCollection', 'features': []});
