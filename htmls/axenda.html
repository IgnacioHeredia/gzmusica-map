    <style>
      @import url("https://fonts.googleapis.com/css?family=Raleway:400,300,700,500");

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }

      #menu {
        font-family: "Raleway", sans-serif !important;
      }

      /* Marker tweaks */
      .maplibregl-popup-close-button {
        display: none;
      }

      .maplibregl-popup-content h4 {
        font: 600 15px/22px 'Source Sans Pro', 'Helvetica Neue', sans-serif;
        font-weight: 700;
        margin-bottom: -15px;
      }

      /* Bootstrap button */
      .btn.btn-dark:focus {
        background-color: #85001c
      }

      @media (max-width: 500px) {
        .HideOnMobile {
          display: none;
        }
        .ShowOnMobile {
          display: initial;
        }
      }

      @media (min-width: 500px) {
        .HideOnMobile {
          display: initial;
        }
        .ShowOnMobile {
          display: none;
        }
      }

    </style>

  </head>
  <body>

    <div id="map"></div>

    <div id="menu">
      <div class="col text-center">

        <!-- On big screens we show un-collapsed buttons -->
        <div class="HideOnMobile">
          <button class="btn btn-dark mt-1 mb-1 filter-today">Hoxe</button>
          <button class="btn btn-dark mt-1 mb-1 filter-tomorrow">Mañá</button>
          <button class="btn btn-dark mt-1 mb-1 filter-week">Próximos 7 días</button>
          <button class="btn btn-dark mt-1 mb-1 filter-month" autofocus="autofocus">Próximos 30 días</button>
        </div>

        <!-- On small screens we show buttons collapsed in a single dropdown -->
        <div class="ShowOnMobile">
          <div class="dropdown">
            <button class="btn btn-dark mt-1 mb-1 dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              Data
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
              <a class="dropdown-item filter-today">Hoxe</a>
              <a class="dropdown-item filter-tomorrow">Mañá</a>
              <a class="dropdown-item filter-week">Próximos 7 días</a>
              <a class="dropdown-item filter-month">Próximos 30 días</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>

      // Responsiveness for smartphones
      if (screen.width < 500) {
        initial_zoom = 6;  // the smaller the smartphone, the smaller the initial zoom

        initial_zoom = 7;

              'https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png'

              // 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
              // 'https://stamen-tiles-b.a.ssl.fastly.net/toner/{z}/{x}/{y}.png'

        "layers": [{
          "id": "osm",
          "type": "raster",
          "source": "osm" // This must match the source key above
        }]
      };

        // style: 'https://openmaptiles.github.io/positron-gl-style/style-cdn.json',
        style: style,
        center: [-8.0, 42.756501],
        zoom: initial_zoom
      });

      // Disable map rotation
      map.dragRotate.disable();
      map.touchZoomRotate.disableRotation();

      // Avoid fractional zoom that makes maps blurry
      // related issue: https://github.com/mapbox/mapbox-gl-js/issues/1695#issuecomment-478392580

      // better setWheelZoomRate(1) and disable touch zoom
      map.addControl(new maplibregl.NavigationControl());
      map.scrollZoom.setWheelZoomRate(1);
      map.touchZoomRotate.disable();

      // Add fullscreen button
      map.addControl(new maplibregl.FullscreenControl());

, Sábado 25, Domingo 26 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.641966443259593', '42.43292522381141']}, 'properties': {'name': 'Xolda', 'location': 'Pontevedra', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29484/-/xolda.html', 'dates': 'Venres 24 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.394778810458867', '43.372863676263506']}, 'properties': {'name': 'Ruxe Ruxe + Bule', 'location': 'A Coruña', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29778/-/ruxe-ruxe-bule.html', 'dates': 'Venres 24 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.884065831681589', '42.647654615979434']}, 'properties': {'name': 'Zënzar + Sun Iou', 'location': 'Boiro', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29768/-/zenzar-sun-iou.html', 'dates': 'Venres 24 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.223632745042102', '42.623984463867025']}, 'properties': {'name': 'IV Xornada Carballesa', 'location': 'Seceda (Folgoso do Courel)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29714/-/iv-xornada-carballesa.html', 'dates': 'Sábado 25 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-2.47692795955685', '43.18500554031447']}, 'properties': {'name': 'Xabier Díaz & Adufeiras de Salitre', 'location': 'Eibar, Gipuzkoa (Euskal Herria)', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29769/-/xabier-diaz-adufeiras-de-salitre.html', 'dates': 'Sábado 25 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-8.508655731691285', '42.53868095582862']}, 'properties': {'name': 'I Cantos de Taberna Campo Lameiro', 'location': 'Campo Lameiro', 'link': 'https://www.gzmusica.com/axenda/eventdetail/29689/-/i-cantos-de-taberna-campo-lameiro.html', 'dates': 'Sábado 25 [Abril]'}}, {'type': 'Feature', 'geometry': {'type': 'Point', 'coordinates': ['-7.793360147634714', '42.088             // data: "https://docs.mapbox.com/mapbox-gl-js/assets/earthquakes.geojson",
            cluster: !0,
            clusterMaxZoom: 14,
            clusterRadius: 50
          }), map.addLayer({
            id: "clusters",
            type: "circle",
            source: "earthquakes",
            filter: ["has", "point_count"],
            paint: {
              "circle-color": ["step", ["get", "point_count"], "#51bbd6", 10, "#ed9f32", 20, "#f28cb1"],
              "circle-radius": ["step", ["get", "point_count"], 20, 100, 30, 750, 40]
            }
          }), map.addLayer({
            id: "cluster-count",
            type: "symbol",
            source: "earthquakes",
            filter: ["has", "point_count"],
            layout: {
              "text-field": "{point_count_abbreviated}",
              // "text-font": ["DIN Offc Pro Medium", "Arial Unicode MS Bold"],
              "text-font": ["Open Sans Bold"],
              "text-size": 12
            }
          }), map.addLayer({
            id: "unclustered-point",
            type: "circle",
            source: "earthquakes",
            filter: ["!", ["has", "point_count"]],
            paint: {
              "circle-color": "#11b4da",
              "circle-radius": 7,
              "circle-stroke-width": 2,
              "circle-stroke-color": "#0b5975"
            }
          }), map.on("click", "clusters", e => {
            const t = map.queryRenderedFeatures(e.point, {
                layers: ["clusters"]
